<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Quiz Kit – Preview</title>
  <link rel="stylesheet" href="../scorm-bundle/styles.css">
  <link rel="stylesheet" href="/static/blockly-styles.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; color: #1f2937; }
    #root { width: 100%; max-width: 900px; margin: 24px auto; }
    .loading-spinner { border: 4px solid #e5e7eb; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 60px auto 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-message { text-align: center; padding: 20px; margin-top: 10px; color: #4b5563; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-spinner" aria-label="Loading preview"></div>
    <p class="status-message" role="status">Loading Preview...</p>
  </div>

  <script src="../scorm-bundle/player.js"></script>
  <script>
    (function () {
      async function main() {
        if (!window.QuizPlayerBundle || typeof window.QuizPlayerBundle.mountQuizPlayer !== 'function') {
          document.getElementById('root').innerHTML = '<p class="status-message" style="color:#ef4444">Error: player bundle not loaded.</p>';
          return;
        }
        const { mountQuizPlayer } = window.QuizPlayerBundle;

        let quizConfigData;
        try {
          const res = await fetch('/preview/quiz_data.json');
          if (!res.ok) throw new Error('Failed to load quiz_data.json');
          quizConfigData = await res.json();
        } catch (e) {
          document.getElementById('root').innerHTML = '<p class="status-message" style="color:#ef4444">Error: cannot load quiz data.</p>';
          console.error('Preview load error:', e);
          return;
        }
        const rootElement = document.getElementById('root');
        if (rootElement) { rootElement.innerHTML = ''; }
        mountQuizPlayer('root', quizConfigData);
      }
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', main); } else { main(); }
    })();
  </script>
</body>
</html>
